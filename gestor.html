<body class="py-4 px-4 md:py-8 md:px-6" onclick="closeAllMenus(event)">
    <!-- Modal de confirmación -->
    <div id="confirmModal" class="modal">
        <div class="modal-content bg-slate-800 p-6 rounded-xl shadow-2xl max-w-md w-full mx-4 border border-slate-700">
            <h3 id="modalTitle" class="text-xl font-bold mb-4 text-red-500">¿Confirmar acción?</h3>
            <p id="modalDesc" class="modal-desc text-slate-400 text-sm mb-6">Esta acción no se puede deshacer.</p>
            <div class="flex justify-end gap-3" id="modalButtons">
                <button onclick="closeModal()" class="modal-cancel px-4 py-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition-colors">Cancelar</button>
                <button id="modalConfirmBtn" class="px-4 py-2 text-sm font-bold bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors shadow-lg shadow-red-500/20">Confirmar</button>
            </div>
        </div>
    </div>

    <textarea id="copyHelper" class="fixed -top-[1000px] left-0 pointer-events-none opacity-0"></textarea>
    <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
    
    <!-- Datepicker container -->
    <div id="datepickerContainer"></div>

    <div class="w-full">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-slate-700/30 pb-6">

                <button onclick="addNewRow()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg text-sm flex items-center gap-2 transition-all shadow-lg shadow-blue-500/30">
                    <span class="material-symbols-outlined text-lg">add_circle</span>
                    Añadir
                </button>

                <button onclick="undoLastAction()" id="undoBtn" disabled class="disabled:opacity-30 disabled:cursor-not-allowed bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 px-4 rounded-lg text-sm flex items-center gap-2 transition-colors">
                    <span class="material-symbols-outlined text-lg">undo</span>
                    Deshacer
                </button>

                <div class="flex rounded-lg overflow-hidden">
                    <button onclick="exportToCSV()" title="Exportar a CSV" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 px-4 text-sm flex items-center gap-2 transition-colors">
                        <span class="material-symbols-outlined text-lg">download</span>
                        Exportar
                    </button>
                    <div class="w-[1px] bg-slate-600/30"></div>
                    <button onclick="document.getElementById('csvFileInput').click()" title="Importar desde CSV" class="bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 px-4 text-sm flex items-center gap-2 transition-colors">
                        <span class="material-symbols-outlined text-lg">upload</span>
                        Importar
                    </button>
                </div>

                <button onclick="printSelectedToPDF()" title="Imprimir seleccionadas a PDF" class="square-btn bg-blue-600/10 text-blue-500 hover:bg-blue-600 hover:text-white rounded-lg transition-all border-none ml-2 relative">
                    <span class="material-symbols-outlined text-2xl">print</span>
                    <span id="printBadge" class="hidden absolute -top-1 -right-1 bg-blue-500 text-white text-xs font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1">0</span>
                </button>

                <button onclick="askClearOrSelected()" title="Borrar seleccionadas o todo" class="square-btn bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white rounded-lg transition-all border-none relative">
                    <span class="material-symbols-outlined text-2xl">delete_sweep</span>
                    <span id="selectedBadge" class="hidden absolute -top-1 -right-1 bg-blue-500 text-white text-xs font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1">0</span>
                </button>
            </div>
        </header>

        <div class="top-scroll-container" id="topScroll">
            <div class="top-scroll-inner" id="topScrollInner"></div>
        </div>
        <div class="table-container overflow-x-auto" id="tableContainer">
            <table class="w-full text-left border-collapse" id="ordersTable">
                <thead>
                    <tr id="headerRow"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="mt-4 flex justify-between items-center text-xs font-bold px-2 uppercase tracking-wide footer-text">
            <div>Mostrando <span id="count" class="count-text">0</span> <span id="countLabel">pedidos</span></div>
            <button id="clearFiltersBtn" onclick="clearFilters()" class="hidden clear-filters-btn flex items-center gap-1 transition-colors">
                <span class="material-symbols-outlined text-sm">filter_alt_off</span> Limpiar filtros
            </button>
        </div>
        
        <div class="mt-4 text-center text-xs italic text-slate-500">
            Creado por David Plaza Yuste
        </div>
    </div>

<!-- ═══ MODAL CONFIGURADOR DE ADOSAMIENTO ═══════════════════════════════════ -->
<div id="adoModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;" onclick="adoModalBackdrop(event)">
    <div style="background:#0f172a;border:1px solid #334155;border-radius:12px;width:98vw;max-width:1600px;height:96vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.6);">
        <!-- Header -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1e293b;flex-shrink:0;">
            <div>
                <div style="font-size:13px;font-weight:700;color:#e2e8f0;letter-spacing:0.07em;text-transform:uppercase;">Configuración de Adosamiento</div>
                <div id="adoSubtitle" style="font-size:11px;color:#64748b;margin-top:2px;"></div>
            </div>
            <button onclick="adoClose()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:22px;line-height:1;padding:2px 6px;" title="Cerrar">✕</button>
        </div>
        <!-- Canvas -->
        <div style="flex:1;overflow:hidden;padding:12px;min-height:0;">
            <div id="adoCanvasWrap" style="width:100%;height:100%;min-height:340px;background:#080f1e;border-radius:8px;border:1px solid #1e293b;position:relative;overflow:hidden;">
                <svg id="adoSvg" style="display:block;width:100%;height:100%;" xmlns="http://www.w3.org/2000/svg"></svg>
                <!-- Picker popup -->
                <div id="adoPicker" style="display:none;position:absolute;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px;z-index:20;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,0.6);">
                    <div style="font-size:10px;color:#64748b;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.06em;">Seleccionar módulo</div>
                    <div id="adoPickerList"></div>
                    <button onclick="adoPickerClose()" style="margin-top:6px;width:100%;background:transparent;border:1px solid #334155;border-radius:4px;color:#64748b;font-size:11px;padding:4px;cursor:pointer;">Cancelar</button>
                </div>
                <!-- Wall menu popup (contenido dinámico) -->
                <div id="adoWallMenu" style="display:none;position:absolute;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px;z-index:21;min-width:215px;box-shadow:0 8px 32px rgba(0,0,0,0.6);"></div>
            </div>
        </div>
        <!-- Leyenda -->
        <div id="adoLegend" style="padding:7px 20px;border-top:1px solid #1e293b;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:11px;color:#64748b;flex-shrink:0;min-height:34px;"></div>
        <!-- Footer -->
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 20px;border-top:1px solid #1e293b;flex-shrink:0;">
            <button onclick="adoReset()" style="background:transparent;border:1px solid #334155;border-radius:6px;color:#64748b;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;">Reiniciar</button>
            <div style="display:flex;gap:8px;">
                <button onclick="adoUndo()" title="Deshacer (Ctrl+Z)" style="background:transparent;border:1px solid #334155;border-radius:6px;color:#64748b;font-size:15px;font-weight:700;padding:5px 12px;cursor:pointer;line-height:1;">↩</button>
                <button onclick="adoRedo()" title="Rehacer (Ctrl+Y)" style="background:transparent;border:1px solid #334155;border-radius:6px;color:#64748b;font-size:15px;font-weight:700;padding:5px 12px;cursor:pointer;line-height:1;">↪</button>
                <button onclick="adoClose()" style="background:transparent;border:1px solid #475569;border-radius:6px;color:#94a3b8;font-size:12px;font-weight:600;padding:7px 16px;cursor:pointer;">Cancelar</button>
                <button onclick="adoSave()" style="background:rgba(20,184,166,0.15);border:1px solid rgba(20,184,166,0.55);border-radius:6px;color:#5eead4;font-size:12px;font-weight:700;padding:7px 22px;cursor:pointer;">Aceptar</button>
            </div>
        </div>
    </div>
</div>
